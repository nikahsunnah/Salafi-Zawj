    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'ns-plum': '#4B2E5D',      // Reverted to Original Brand Plum
              'ns-warmgrey': '#F3F1EE',  // Warm Grey (Stone/Sand variant)
              'ns-sand': '#E6D3B1',      // Original Soft Sand
              'ns-mauve': '#BFA2B8',     // Muted Mauve
              'ns-dark': '#2B2B2B',      // Deep Text
              'ns-white': '#FFFFFF',
            },
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            borderRadius: {
              'xl': '0.75rem',
              '2xl': '1rem',
              '3xl': '1.5rem',
              '4xl': '2rem',
            },
            animation: {
              'reveal': 'reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'aura': 'aura 15s ease-in-out infinite',
              'twinkle': 'twinkle 4s ease-in-out infinite',
              'marquee': 'marquee 60s linear infinite',
              'vertical-scroll': 'vertical-scroll 30s linear infinite',
            },
            keyframes: {
              reveal: {
                '0%': { opacity: 0, transform: 'translateY(20px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              },
              aura: {
                '0%, 100%': { transform: 'translate(0, 0) scale(1)', opacity: 0.3 },
                '33%': { transform: 'translate(10%, -5%) scale(1.1)', opacity: 0.5 },
                '66%': { transform: 'translate(-5%, 10%) scale(0.9)', opacity: 0.4 },
              },
              twinkle: {
                '0%, 100%': { opacity: 0.2, transform: 'scale(0.8) rotate(0deg)' },
                '50%': { opacity: 0.5, transform: 'scale(1.1) rotate(15deg)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              'vertical-scroll': {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(-50%)' },
              }
            }
          }
        }
      }
    </script>
